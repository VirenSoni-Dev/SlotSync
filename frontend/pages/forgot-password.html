<!DOCTYPE html>
<html lang="en">

<head>
   <meta charset="UTF-8" />
   <meta name="viewport" content="width=device-width, initial-scale=1.0" />
   <title>Forgot Password — SlotSync</title>
   <link rel="preconnect" href="https://fonts.googleapis.com" />
   <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
   <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap"
      rel="stylesheet" />
   <link rel="stylesheet" href="https://cdn.hugeicons.com/font/hgi-stroke-rounded.css" />
   <link rel="stylesheet" href="../css/main.css" />
   <link rel="stylesheet" href="../css/auth.css" />
</head>

<body class="auth-page">

   <!-- Minimal navbar -->
   <nav class="auth-nav">
      <a href="../index.html" class="nav-logo">
         <img src="../assets/logo.svg" alt="SlotSync Logo" />
         SlotSync
      </a>
      <span class="auth-nav-hint">
         Remembered it?
         <a href="login.html">Log in</a>
      </span>
   </nav>

   <main class="auth-main auth-main-centered">

      <!-- Step 1 — Enter email -->
      <div class="auth-card otp-card" id="stepEmail">

         <div class="otp-icon-wrap">
            <i class="hgi hgi-stroke hgi-lock-password"></i>
         </div>

         <div class="auth-card-header">
            <h1>Forgot password?</h1>
            <p>Enter your email and we'll send you a reset code.</p>
         </div>

         <div class="auth-error" id="emailStepError" style="display:none;"></div>
         <div class="auth-success" id="emailStepSuccess" style="display:none;"></div>

         <div class="auth-fields">
            <div class="field-group">
               <label for="email">Email Address</label>
               <div class="field-input-wrap">
                  <i class="hgi hgi-stroke hgi-mail-01"></i>
                  <input type="email" id="email" placeholder="rahul@example.com" autocomplete="email" />
               </div>
               <span class="field-error" id="emailError"></span>
            </div>
         </div>

         <button class="btn-primary btn-full" id="sendOtpBtn">
            <span id="sendOtpBtnText">Send Reset Code</span>
            <span id="sendOtpBtnLoader" class="btn-spinner" style="display:none;"></span>
         </button>

         <a href="login.html" class="auth-back-link">
            <i class="hgi hgi-stroke hgi-arrow-left-01"></i>
            Back to login
         </a>

      </div>

      <!-- Step 2 — Enter OTP + new password (hidden initially) -->
      <div class="auth-card otp-card" id="stepReset" style="display:none;">

         <div class="otp-icon-wrap">
            🔐
         </div>

         <div class="auth-card-header">
            <h1>Reset password</h1>
            <p>
               Enter the code sent to<br />
               <strong id="resetEmail"></strong>
            </p>
         </div>

         <div class="auth-error" id="resetStepError" style="display:none;"></div>
         <div class="auth-success" id="resetStepSuccess" style="display:none;"></div>

         <!-- OTP boxes -->
         <div class="otp-inputs" id="otpInputs">
            <input type="text" class="otp-box" maxlength="1" inputmode="numeric" pattern="[0-9]" />
            <input type="text" class="otp-box" maxlength="1" inputmode="numeric" pattern="[0-9]" />
            <input type="text" class="otp-box" maxlength="1" inputmode="numeric" pattern="[0-9]" />
            <input type="text" class="otp-box" maxlength="1" inputmode="numeric" pattern="[0-9]" />
            <input type="text" class="otp-box" maxlength="1" inputmode="numeric" pattern="[0-9]" />
            <input type="text" class="otp-box" maxlength="1" inputmode="numeric" pattern="[0-9]" />
         </div>

         <!-- New password -->
         <div class="auth-fields" style="margin-top: 20px;">
            <div class="field-group">
               <label for="newPassword">New Password</label>
               <div class="field-input-wrap">
                  <i class="hgi hgi-stroke hgi-lock-password"></i>
                  <input type="password" id="newPassword" placeholder="Minimum 8 characters"
                     autocomplete="new-password" />
                  <button type="button" class="field-toggle" id="toggleNewPassword" aria-label="Toggle password">
                     <i class="hgi hgi-stroke hgi-view-01" id="toggleNewIcon"></i>
                  </button>
               </div>
               <span class="field-error" id="newPasswordError"></span>
            </div>
         </div>

         <button class="btn-primary btn-full" id="resetBtn">
            <span id="resetBtnText">Reset Password</span>
            <span id="resetBtnLoader" class="btn-spinner" style="display:none;"></span>
         </button>

         <!-- Resend timer -->
         <div class="otp-resend">
            <span id="resendTimer">
               Resend code in <strong id="countdown">30</strong>s
            </span>
            <button class="otp-resend-btn" id="resendBtn" style="display:none;">
               <i class="hgi hgi-stroke hgi-refresh"></i>
               Resend code
            </button>
         </div>

      </div>

   </main>

   <script type="module" src="../js/forgot-password.js"></script>
</body>

</html>
