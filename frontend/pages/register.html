<!DOCTYPE html>
<html lang="en">

<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Sign up | SlotSync</title>
   <link rel="stylesheet" href="../css/main.css">
   <link rel="stylesheet" href="../css/auth.css">
</head>

<body>
   <div class="auth-container">
      <div class="auth-card">
         <h2>Create an account</h2>
         <p>Start managing your appointments effortlessly.</p>

         <form id="registerForm">
            <div class="input-group">
               <label for="name">Full Name</label>
               <input type="text" id="name" placeholder="John Doe" required>
            </div>
            <div class="input-group">
               <label for="email">Email address</label>
               <input type="email" id="email" placeholder="name@example.com" required>
            </div>
            <div class="input-group">
               <label for="phone">Phone Number</label>
               <input type="tel" id="phone" placeholder="+91 9876543210" required>
            </div>
            <div class="input-group">
               <label for="password">Password</label>
               <input type="password" id="password" placeholder="Create a strong password" required>
            </div>
            <button type="submit" class="btn btn-primary btn-full btn-large">Sign up</button>
         </form>

         <div class="auth-footer">
            Already have an account? <a href="login.html">Log in</a>
         </div>
      </div>
   </div>
   <script type="module" src="../js/api.js"></script>
   <script type="module" src="../js/register.js"></script>
</body>

</html>
