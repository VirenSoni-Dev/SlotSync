<!DOCTYPE html>
<html lang="en">

<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Verify Email | SlotSync</title>
   <link rel="stylesheet" href="../css/main.css">
   <link rel="stylesheet" href="../css/auth.css">
</head>

<body>
   <div class="auth-container">
      <div class="auth-card">
         <h2>Check your email</h2>
         <p>We've sent a 6-digit verification code to your email address.</p>

         <form id="otpForm">
            <div class="input-group">
               <label for="otp">Verification Code</label>
               <input type="text" id="otp" maxlength="6" placeholder="123456" required autocomplete="off">
            </div>
            <button type="submit" class="btn btn-primary btn-full btn-large">Verify Account</button>
         </form>

         <div class="auth-footer">
            Didn't receive the code? <a href="#" id="resendOtp">Resend</a>
         </div>
      </div>
   </div>

   <script type="module" src="../js/api.js"></script>
   <script type="module" src="../js/verify-otp.js"></script>
</body>

</html>
